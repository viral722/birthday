<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000; /* BLACK BACKGROUND */
font-family:'Comic Sans MS',sans-serif;
overflow:hidden;
color:white;
}

/* CENTER BOX */

.center-content{
display:flex;
flex-direction:column;
align-items:center;
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
z-index:2;
}

/* CAKE */

.cake-container{
margin-bottom:20px;
position:relative;
}

.layer{
width:170px;
height:35px;
border-radius:10px;
margin:4px auto;
opacity:0;
transform:translateY(-100px);
animation:dropCake .5s forwards;
}

.bread{
background:#8d6e63;
border-bottom:4px solid #5d4037;
}

.cream{
background:#fff8e1;
border-bottom:2px solid #ffe0b2;
}

.layer:nth-child(2){animation-delay:.2s;}
.layer:nth-child(3){animation-delay:.4s;}
.layer:nth-child(4){animation-delay:.6s;}
.layer:nth-child(5){animation-delay:.8s;}

@keyframes dropCake{
to{
opacity:1;
transform:translateY(0);
}
}

/* CANDLE */

.candle{
width:12px;
height:55px;
background:repeating-linear-gradient(45deg,#fff,#fff 5px,#ff69b4 5px,#ff69b4 10px);
margin:auto;
border-radius:4px;
position:relative;
}

/* FLAME */

.flame{
position:absolute;
top:-22px;
left:50%;
transform:translateX(-50%);
width:14px;
height:22px;
background:linear-gradient(to top,#ff9900,#ffff00);
border-radius:50% 50% 20% 20%;
box-shadow:0 0 12px #ff9900;
animation:flicker .15s infinite alternate;
}

@keyframes flicker{
from{transform:translateX(-50%) scale(1);}
to{transform:translateX(-50%) scale(1.1,.9);}
}

/* TEXT */

h1{
color:#fff;
font-size:2.6rem;
text-shadow:2px 2px 6px rgba(0,0,0,0.5);
margin:0;
text-align:center;
}

/* BALLOONS */

.balloon{
position:absolute;
bottom:-100px;
width:50px;
height:70px;
border-radius:50%;
opacity:.9;
animation:floatUp linear infinite;
}

.balloon:before{
content:"";
position:absolute;
bottom:-10px;
left:50%;
transform:translateX(-50%);
width:2px;
height:40px;
background:rgba(255,255,255,.3);
}

/* HEARTS */

.heart{
position:absolute;
font-size:24px;
animation:floatUp linear infinite;
opacity:.8;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="i_think_this_love.mp3" type="audio/mpeg">
</audio>

<div class="center-content">

<div class="cake-container">

<div class="candle">
<div class="flame"></div>
</div>

<div class="layer bread"></div>
<div class="layer cream"></div>
<div class="layer bread"></div>
<div class="layer cream"></div>

</div>

<h1>🎉 Happy Birthday In Advance Buggu 🎂</h1>

</div>

<script>

const colors=['#ff6b6b','#4ecdc4','#ffe66d','#ff9ff3','#54a0ff'];

/* BALLOONS */

for(let i=0;i<20;i++){

let balloon=document.createElement('div');
balloon.classList.add('balloon');

balloon.style.background=colors[Math.floor(Math.random()*colors.length)];
balloon.style.left=Math.random()*100+'%';
balloon.style.animationDuration=(6+Math.random()*10)+'s';

balloon.style.width=(40+Math.random()*30)+'px';
balloon.style.height=(60+Math.random()*40)+'px';

document.body.appendChild(balloon);

}

/* HEARTS */

for(let i=0;i<30;i++){

let heart=document.createElement('div');
heart.classList.add('heart');

heart.innerHTML="❤️";
heart.style.left=Math.random()*100+'%';
heart.style.bottom='-50px';
heart.style.fontSize=(20+Math.random()*25)+'px';
heart.style.animationDuration=(5+Math.random()*8)+'s';

document.body.appendChild(heart);

}

</script>

</body>
</html>
